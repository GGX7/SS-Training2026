<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SS-Training｜Week 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+JP:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --base03:#002b36; --base02:#073642; --base01:#586e75; --base00:#657b83;
  --base0:#839496; --base1:#93a1a1; --base2:#eee8d5; --base3:#fdf6e3;
  --yellow:#b58900; --blue:#268bd2; --red:#dc322f;
  --serif:"IBM Plex Serif","Noto Serif JP",Georgia,serif;
  --sans:"IBM Plex Sans","IBM Plex Sans JP",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{background:var(--base3);color:var(--base00);font-family:var(--sans);font-size:15px;line-height:1.75;-webkit-font-smoothing:antialiased}
::selection{background:#ecd78e;color:var(--base02)}

.app{display:grid;grid-template-columns:30% 70%;height:100vh;overflow:hidden}

/* ── rail ── */
.rail{border-right:1px solid var(--base2);display:flex;flex-direction:column;min-width:0;background:var(--base3)}
.rail-head{padding:28px 28px 20px}
.rail-title{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--base02);margin:0;letter-spacing:-0.005em}
.rail-sub{font-family:var(--mono);font-size:11px;color:var(--base1);margin-top:4px}
.rail-body{overflow-y:auto;padding:0 20px 40px;flex:1;scrollbar-width:thin;scrollbar-color:#d9cda0 transparent}
.rail-body::-webkit-scrollbar{width:6px}
.rail-body::-webkit-scrollbar-thumb{background:#e5d9ab;border-radius:10px}

/* tree */
.tree,.tree ul{list-style:none;margin:0;padding:0}
.t-row{display:flex;align-items:center;gap:5px;padding:3px 4px 3px 0;cursor:pointer;color:var(--base01);user-select:none;border-radius:3px}
.t-row:hover{color:var(--base02);background:rgba(0,0,0,0.03)}
.t-row.is-active{color:var(--yellow)}
.t-row.is-active .t-label{font-weight:500}
.t-row.locked{color:var(--base1);cursor:default}
.t-row.locked:hover{color:var(--base1);background:none}

/* chevron & leaf icons */
.t-chevron{flex-shrink:0;width:12px;height:12px;display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--base1);transition:transform 0.15s ease;line-height:1}
.t-chevron.open{transform:rotate(90deg)}
.t-leaf-icon{flex-shrink:0;width:12px;height:12px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--base2);line-height:1}

.t-label{font-size:13px;letter-spacing:-0.003em;line-height:1.35}
.tree > li > .t-row .t-label{font-family:var(--serif);font-weight:600;color:var(--base02);font-size:13.5px}
.tree > li > .t-row.locked .t-label{color:var(--base1)}

/* tree lines — indent + vertical guides */
.t-children{padding-left:14px;margin-left:6px;margin-top:1px;margin-bottom:4px}

/* each li draws its own vertical segment */
.t-children > li{position:relative}

.t-children > li::before{
  content:'';position:absolute;
  left:-8px;top:0;bottom:0;
  width:1px;background:var(--base2);
}
/* last sibling: cut line at connector level */
.t-children > li:last-child::before{bottom:auto;height:12px}

/* horizontal connector ─ */
.t-children > li::after{
  content:'';position:absolute;
  left:-8px;top:12px;
  width:6px;height:1px;background:var(--base2);
}
.tree > li{margin-bottom:12px}

/* ── main ── */
.main{overflow-y:auto;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:#d9cda0 transparent}
.main::-webkit-scrollbar{width:8px}
.main::-webkit-scrollbar-thumb{background:#e5d9ab;border-radius:10px}
.content{max-width:720px;margin:0 auto;padding:80px 72px 160px}

/* typography */
h1{font-family:var(--serif);font-size:30px;font-weight:600;color:var(--base02);letter-spacing:-0.015em;line-height:1.25;margin:0 0 8px}
.lede{font-family:var(--serif);font-size:15.5px;color:var(--base01);margin:0 0 48px;max-width:62ch}
h2{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--base02);margin:56px 0 14px;letter-spacing:-0.01em;scroll-margin-top:40px}
h3{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--base02);margin:28px 0 8px;letter-spacing:0}
p{margin:0 0 14px;max-width:66ch}
strong{color:var(--base02);font-weight:600}
em{font-style:italic;color:var(--base01)}
a{color:var(--blue);text-decoration:none;border-bottom:1px solid transparent}
a:hover{border-bottom-color:var(--blue)}

ul{padding-left:1.3em;margin:10px 0 18px}
ul li{margin:3px 0}
ul li::marker{color:var(--base1)}

/* inline code */
code{font-family:var(--mono);font-size:0.88em;color:var(--yellow)}
p code,li code{background:transparent}

/* code block */
pre{font-family:var(--mono);font-size:12.5px;line-height:1.7;color:var(--base01);background:transparent;border-left:2px solid var(--base2);padding:2px 0 2px 16px;margin:14px 0 20px;overflow-x:auto}
pre .p{color:var(--base1)}
pre .c{color:var(--base1)}
pre .o{color:var(--base02)}
pre .k{color:var(--yellow)}

/* note — minimal, a single vertical rule */
.note{border-left:2px solid var(--yellow);padding:2px 0 2px 16px;margin:18px 0;color:var(--base01);font-size:14px}
.note strong{color:var(--yellow);font-weight:500;letter-spacing:0.02em;font-family:var(--mono);font-size:11px;text-transform:uppercase;display:block;margin-bottom:4px}

hr{border:0;border-top:1px solid var(--base2);margin:56px 0}

/* day nav */
.day-nav{display:flex;justify-content:space-between;gap:40px;margin-top:72px;padding-top:24px;border-top:1px solid var(--base2);font-family:var(--mono);font-size:12px}
.day-nav a{color:var(--base01);cursor:pointer;border:none}
.day-nav a:hover{color:var(--yellow)}
.day-nav a.disabled{color:var(--base1);pointer-events:none}
.day-nav .lbl{display:block;font-size:10.5px;color:var(--base1);margin-bottom:3px;letter-spacing:0.05em}
.day-nav .next{text-align:right}

/* day header */
.day-meta{font-family:var(--mono);font-size:11px;color:var(--base1);letter-spacing:0.04em;margin-bottom:14px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="src/curriculum.jsx"></script>
<script type="text/babel" src="src/tree.jsx"></script>
<script type="text/babel" src="src/day1.jsx"></script>
<script type="text/babel" src="src/day2.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
