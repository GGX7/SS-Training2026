<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SS-Training｜Week 1</title>
<link rel="icon" type="image/png" href="src/smile.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+JP:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --base03:#002b36; --base02:#073642; --base01:#586e75; --base00:#657b83;
  --base0:#839496; --base1:#93a1a1; --base2:#eee8d5; --base3:#fdf6e3;
  --yellow:#b58900; --blue:#268bd2; --red:#dc322f;
  --serif:"IBM Plex Serif","Noto Serif JP",Georgia,serif;
  --sans:"IBM Plex Sans","IBM Plex Sans JP",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
  --rail-bg:#f4eedf;
}
/* ── Solarized Dark ── */
[data-theme="dark"]{
  --base03:#fdf6e3; --base02:#eee8d5; --base01:#93a1a1; --base00:#839496;
  --base0:#657b83;  --base1:#586e75;  --base2:#073642;  --base3:#002b36;
  --rail-bg:#073642;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{background:var(--base3);color:var(--base01);font-family:var(--sans);font-size:15px;line-height:1.75;-webkit-font-smoothing:antialiased}
::selection{background:#ecd78e;color:var(--base02)}

.app{display:grid;grid-template-columns:30% 70%;height:100vh;overflow:hidden}

/* ── rail ── */
.rail{border-right:2px solid var(--base1);display:flex;flex-direction:column;min-width:0;background:var(--rail-bg);transition:background-color 0.2s}
.rail-head{padding:20px 20px 14px;border-bottom:1px solid var(--base1)}
.rail-head-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.rail-title{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--base02);margin:0;letter-spacing:-0.01em}
.rail-sub{font-family:var(--mono);font-size:11px;color:var(--base0);margin-top:6px;letter-spacing:0.02em}
.theme-btn{
  flex-shrink:0;background:none;border:1px solid var(--base1);color:var(--base0);
  cursor:pointer;font-size:15px;width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  transition:border-color 0.15s,color 0.15s;padding:0;line-height:1;
}
.theme-btn:hover{border-color:var(--base01);color:var(--base02)}
.rail-body{overflow-y:auto;padding:16px 12px 48px;flex:1;scrollbar-width:thin;scrollbar-color:#9a9070 transparent}
.rail-body::-webkit-scrollbar{width:5px}
.rail-body::-webkit-scrollbar-thumb{background:#a09070;border-radius:10px}

/* ── tree base ── */
.tree,.tree ul{list-style:none;margin:0;padding:0}
.t-row{
  display:flex;align-items:center;gap:6px;
  padding:5px 6px;
  cursor:pointer;user-select:none;
  border-radius:4px;position:relative;
  transition:background 0.1s;
}
.t-chevron{
  flex-shrink:0;width:16px;height:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;line-height:1;
  transition:transform 0.15s ease;
}
.t-chevron.open{transform:rotate(90deg)}
.t-leaf{
  flex-shrink:0;width:8px;height:8px;
  border-radius:50%;background:var(--base0);
  margin:0 4px;
}
.t-label{line-height:1.35;letter-spacing:-0.003em}

/* ── PART (第N部) ── */
.tree > li{margin-bottom:0}
.tree > li + li{margin-top:22px;padding-top:18px;border-top:2px solid var(--base1)}
.t-row.t-part{padding:3px 6px;gap:6px}
.t-row.t-part:hover{background:none}
.t-row.t-part .t-chevron{color:var(--base1)}
.t-row.t-part .t-label{
  font-family:var(--serif);font-size:14.5px;font-weight:600;
  color:var(--base02);letter-spacing:-0.01em;
}
.t-row.t-part.locked{opacity:0.45;cursor:default}
.t-row.t-part.locked:hover{background:none}

/* part's child list (chapters) — no tree lines, tighter indent */
.tree > li > .t-children{
  padding-left:4px;margin-left:0;margin-top:6px;margin-bottom:0;
}
.tree > li > .t-children > li::before,
.tree > li > .t-children > li::after{display:none}

/* ── CHAPTER (第N章) ── */
.t-row.t-chapter{padding:5px 6px;gap:6px;color:var(--base01)}
.t-row.t-chapter:hover{background:rgba(0,0,0,0.06)}
.t-row.t-chapter .t-chevron{color:var(--base0)}
.t-row.t-chapter .t-label{font-size:13.5px;color:var(--base01)}
.t-row.t-chapter.locked{opacity:0.45;cursor:default}
.t-row.t-chapter.locked:hover{background:none}

/* chapter's child list (sections) — tree lines start here */
.tree > li > .t-children > li > .t-children{
  padding-left:14px;margin-left:10px;margin-top:2px;margin-bottom:6px;
}
.tree > li > .t-children > li > .t-children > li{position:relative}
.tree > li > .t-children > li > .t-children > li::before{
  content:'';position:absolute;display:block;
  left:-8px;top:0;bottom:0;width:1px;background:var(--base1);
}
.tree > li > .t-children > li > .t-children > li:last-child::before{bottom:auto;height:14px}
.tree > li > .t-children > li > .t-children > li::after{
  content:'';position:absolute;display:block;
  left:-8px;top:14px;width:8px;height:1px;background:var(--base1);
}

/* ── SECTION (第N節) ── */
.t-row.t-section{padding:5px 6px 5px 4px;color:var(--base01)}
.t-row.t-section:hover{background:rgba(0,0,0,0.06);color:var(--base02)}
.t-row.t-section .t-label{font-size:13.5px}
.t-row.t-section .t-chevron{color:var(--base0)}
.t-row.t-section.locked{opacity:0.4;cursor:default}
.t-row.t-section.locked:hover{background:none;color:var(--base01)}
/* active section: left bar + tinted bg */
.t-row.t-section.is-active{color:var(--yellow);background:rgba(181,137,0,0.12)}
.t-row.t-section.is-active .t-label{font-weight:500}
.t-row.t-section.is-active::before{
  content:'';position:absolute;
  left:0;top:2px;bottom:2px;
  width:3px;border-radius:2px;background:var(--yellow);
}

/* section's child list (subs) — tree lines continue */
.tree > li > .t-children > li > .t-children > li > .t-children{
  padding-left:12px;margin-left:8px;margin-top:1px;margin-bottom:4px;
}
.tree > li > .t-children > li > .t-children > li > .t-children > li{position:relative}
.tree > li > .t-children > li > .t-children > li > .t-children > li::before{
  content:'';position:absolute;display:block;
  left:-7px;top:0;bottom:0;width:1px;background:var(--base1);
}
.tree > li > .t-children > li > .t-children > li > .t-children > li:last-child::before{bottom:auto;height:12px}
.tree > li > .t-children > li > .t-children > li > .t-children > li::after{
  content:'';position:absolute;display:block;
  left:-7px;top:12px;width:7px;height:1px;background:var(--base1);
}

/* ── SUB (小節) ── */
.t-row.t-sub{padding:3px 6px 3px 2px;color:var(--base00)}
.t-row.t-sub:hover{background:rgba(0,0,0,0.06);color:var(--base01)}
.t-row.t-sub .t-label{font-size:12.5px}
.t-row.t-sub .t-leaf{background:var(--base1)}
.t-row.t-sub.is-active{color:var(--yellow)}
.t-row.t-sub.is-active .t-label{color:var(--yellow);font-weight:500}

/* ── main ── */
.main{overflow-y:auto;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:#d9cda0 transparent}
.main::-webkit-scrollbar{width:8px}
.main::-webkit-scrollbar-thumb{background:#e5d9ab;border-radius:10px}
.content{max-width:720px;margin:0 auto;padding:80px 72px 160px}

/* typography */
h1{font-family:var(--serif);font-size:30px;font-weight:600;color:var(--base02);letter-spacing:-0.015em;line-height:1.25;margin:0 0 8px}
.lede{font-family:var(--serif);font-size:15.5px;color:var(--base01);margin:0 0 48px;max-width:62ch}
h2{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--base02);margin:56px 0 14px;letter-spacing:-0.01em;scroll-margin-top:40px}
h3{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--base02);margin:28px 0 8px;letter-spacing:0}
p{margin:0 0 14px;max-width:66ch}
strong{color:var(--base02);font-weight:600}
em{font-style:italic;color:var(--base01)}
a{color:var(--blue);text-decoration:none;border-bottom:1px solid transparent}
a:hover{border-bottom-color:var(--blue)}

ul{padding-left:1.3em;margin:10px 0 18px}
ul li{margin:3px 0}
ul li::marker{color:var(--base0)}

/* inline code */
code{font-family:var(--mono);font-size:0.88em;color:var(--yellow)}
p code,li code{background:transparent}

/* code block */
pre{font-family:var(--mono);font-size:12.5px;line-height:1.7;color:var(--base01);background:transparent;border-left:3px solid var(--base1);padding:2px 0 2px 16px;margin:14px 0 20px;overflow-x:auto}
pre .p{color:var(--base0)}
pre .c{color:var(--base0)}
pre .o{color:var(--base02)}
pre .k{color:var(--yellow)}

/* note — minimal, a single vertical rule */
.note{border-left:3px solid var(--yellow);padding:2px 0 2px 16px;margin:18px 0;color:var(--base01);font-size:14px}
.note strong{color:var(--yellow);font-weight:500;letter-spacing:0.02em;font-family:var(--mono);font-size:11px;text-transform:uppercase;display:block;margin-bottom:4px}

hr{border:0;border-top:1px solid var(--base1);margin:56px 0}

/* day nav */
.day-nav{display:flex;justify-content:space-between;gap:40px;margin-top:72px;padding-top:24px;border-top:1px solid var(--base1);font-family:var(--mono);font-size:12px}
.day-nav a{color:var(--base01);cursor:pointer;border:none}
.day-nav a:hover{color:var(--yellow)}
.day-nav a.disabled{color:var(--base0);pointer-events:none}
.day-nav .lbl{display:block;font-size:10.5px;color:var(--base0);margin-bottom:3px;letter-spacing:0.05em}
.day-nav .next{text-align:right}

/* day header */
.day-meta{font-family:var(--mono);font-size:11px;color:var(--base0);letter-spacing:0.04em;margin-bottom:14px}

/* ── dark mode overrides ── */
body{transition:background-color 0.2s,color 0.2s}
/* hover: light overlay on dark bg */
[data-theme="dark"] .t-row:hover,
[data-theme="dark"] .t-row.t-chapter:hover,
[data-theme="dark"] .t-row.t-section:hover,
[data-theme="dark"] .t-row.t-sub:hover{background:rgba(255,255,255,0.07)}
[data-theme="dark"] .t-row.locked:hover,
[data-theme="dark"] .t-row.t-part.locked:hover,
[data-theme="dark"] .t-row.t-chapter.locked:hover,
[data-theme="dark"] .t-row.t-section.locked:hover{background:none}
/* active section: slightly stronger tint in dark */
[data-theme="dark"] .t-row.t-section.is-active{background:rgba(181,137,0,0.2)}
/* selection */
[data-theme="dark"] ::selection{background:rgba(181,137,0,0.4);color:var(--base02)}
/* scrollbars */
[data-theme="dark"] .rail-body{scrollbar-color:var(--base1) transparent}
[data-theme="dark"] .rail-body::-webkit-scrollbar-thumb{background:var(--base1)}
[data-theme="dark"] .main{scrollbar-color:var(--base1) transparent}
[data-theme="dark"] .main::-webkit-scrollbar-thumb{background:var(--base1)}
</style>
<script>try{var _t=localStorage.getItem("ss-theme");if(_t)document.documentElement.dataset.theme=_t}catch(e){}</script>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>
<script type="text/babel" src="src/curriculum.jsx"></script>
<script type="text/babel" src="src/tree.jsx"></script>
<script type="text/babel" src="src/day1.jsx"></script>
<script type="text/babel" src="src/day2.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
